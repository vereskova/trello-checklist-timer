<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
TrelloPowerUp.initialize({
  'card-back-section': function(t) {
    return {
      title: 'Checklist+ Timer',
      icon: 'https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/icons/check2-square.svg',
      content: {
        type: 'iframe',
        url: t.signUrl('./card-back.html'),
        height: 600
      }
    };
  },

  'card-badges': function(t) {
    return t.get('card', 'shared', 'checklists', []).then(function(checklists) {
      var totalItems = 0;
      var checkedItems = 0;
      var totalTime = 0;

      (checklists || []).forEach(function(cl) {
        (cl.items || []).forEach(function(item) {
          totalItems++;
          if (item.checked) checkedItems++;

          totalTime += item.timerTotal || 0;
          if (item.timerStart) {
            totalTime += Math.floor((Date.now() - item.timerStart) / 1000);
          }

          (item.subitems || []).forEach(function(sub) {
            totalItems++;
            if (sub.checked) checkedItems++;

            totalTime += sub.timerTotal || 0;
            if (sub.timerStart) {
              totalTime += Math.floor((Date.now() - sub.timerStart) / 1000);
            }
          });
        });
      });

      var badges = [];

      if (totalItems > 0) {
        badges.push({
          text: '☑ ' + checkedItems + '/' + totalItems,
          color: checkedItems === totalItems ? 'green' : 'light-gray'
        });
      }

      if (totalTime > 0) {
        badges.push({
          text: '⏱ ' + formatTime(totalTime),
          color: 'light-gray',
          refresh: 10
        });
      }

      return badges;
    });
  }
});

function formatTime(secs) {
  function pad(n) {
    return n < 10 ? '0' + n : '' + n;
  }

  var h = Math.floor(secs / 3600);
  var m = Math.floor((secs % 3600) / 60);
  var s = secs % 60;

  if (h > 0) return h + ':' + pad(m) + ':' + pad(s);
  return pad(m) + ':' + pad(s);
}

TrelloPowerUp.iframe().render(function() {});
</script>
</body>
</html>
