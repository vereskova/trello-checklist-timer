<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #172b4d;
      background: #fff;
      padding: 8px 12px 16px;
    }

    .checklist {
      margin-bottom: 16px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
    }

    .checklist-header {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f4f5f7;
      padding: 8px 10px;
      font-weight: 600;
    }

    .checklist-header input.cl-name {
      flex: 1;
      border: none;
      background: transparent;
      font-weight: 600;
      font-size: 13px;
      color: #172b4d;
      outline: none;
    }

    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      color: #6b778c;
      font-size: 15px;
      line-height: 1;
    }

    .btn-icon:hover { background: #dfe1e6; color: #172b4d; }

    .progress-bar-wrap {
      height: 4px;
      background: #dfe1e6;
    }

    .progress-bar-fill {
      height: 4px;
      background: #0052cc;
      transition: width 0.3s;
    }

    .items { padding: 4px 0; }

    .item-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 5px 10px;
    }

    .item-row:hover { background: #f4f5f7; }

    .item-row input[type="checkbox"] {
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: #0052cc;
    }

    .item-text {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 13px;
      color: #172b4d;
      outline: none;
      resize: none;
      font-family: inherit;
      line-height: 1.4;
    }

    .item-text.checked-text {
      text-decoration: line-through;
      color: #a5adba;
    }

    .timer-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .timer-display {
      font-size: 11px;
      color: #6b778c;
      min-width: 46px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .timer-display.running {
      color: #0052cc;
      font-weight: 600;
    }

    .btn-timer {
      border: none;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      cursor: pointer;
      line-height: 1.4;
    }

    .btn-timer.start { background: #e3fcef; color: #006644; }
    .btn-timer.stop  { background: #ffebe6; color: #bf2600; }
    .btn-timer:hover { opacity: 0.8; }

    .subitems {
      margin-left: 28px;
      border-left: 2px solid #dfe1e6;
      margin-right: 10px;
      border-radius: 0 0 0 4px;
    }

    .subitem-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 4px 8px;
    }

    .subitem-row:hover { background: #f8f9fa; }

    .add-row {
      padding: 4px 10px 6px;
    }

    .btn-add {
      background: none;
      border: none;
      cursor: pointer;
      color: #0052cc;
      font-size: 12px;
      padding: 3px 6px;
      border-radius: 4px;
    }

    .btn-add:hover { background: #deebff; }

    .add-checklist-wrap {
      margin-top: 8px;
    }

    .btn-add-checklist {
      background: #0052cc;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
    }

    .btn-add-checklist:hover { background: #0065ff; }
  </style>
</head>
<body>

<div id="app"></div>

<div class="add-checklist-wrap">
  <button class="btn-add-checklist" onclick="addChecklist()">+ Добавить чеклист</button>
</div>

<script>
var t = TrelloPowerUp.iframe();
var checklists = [];
var timerTick = null;

t.get('card', 'shared', 'checklists', []).then(function(data) {
  checklists = data || [];
  render();
  startTick();
});

function save() {
  return t.set('card', 'shared', 'checklists', checklists)
    .then(function() {
      return t.notifyParent('done');
    })
    .catch(function(err) {
      console.error('Save error:', err);
    });
}

function startTick() {
  if (timerTick) clearInterval(timerTick);

  timerTick = setInterval(function() {
    var hasRunningTimer = false;

    checklists.forEach(function(cl) {
      (cl.items || []).forEach(function(item) {
        if (item.timerStart) {
          hasRunningTimer = true;
          updateTimerDisplay(item.id);
        }

        (item.subitems || []).forEach(function(sub) {
          if (sub.timerStart) {
            hasRunningTimer = true;
            updateTimerDisplay(sub.id);
          }
        });
      });
    });

    if (hasRunningTimer) {
      t.notifyParent('done').catch(function() {});
    }
  }, 1000);
}

function updateTimerDisplay(id) {
  var item = findItem(id);
  if (!item) return;

  var el = document.getElementById('timer-' + id);

  if (el) {
    el.textContent = formatTime(getElapsed(item));
    el.className = 'timer-display' + (item.timerStart ? ' running' : '');
  }
}

function findItem(id) {
  for (var i = 0; i < checklists.length; i++) {
    var cl = checklists[i];

    for (var j = 0; j < (cl.items || []).length; j++) {
      if (cl.items[j].id === id) return cl.items[j];

      for (var k = 0; k < (cl.items[j].subitems || []).length; k++) {
        if (cl.items[j].subitems[k].id === id) return cl.items[j].subitems[k];
      }
    }
  }

  return null;
}

function getElapsed(item) {
  var total = item.timerTotal || 0;

  if (item.timerStart) {
    total += Math.floor((Date.now() - item.timerStart) / 1000);
  }

  return total;
}

function formatTime(secs) {
  var h = Math.floor(secs / 3600);
  var m = Math.floor((secs % 3600) / 60);
  var s = secs % 60;

  if (h > 0) return h + ':' + pad(m) + ':' + pad(s);
  return pad(m) + ':' + pad(s);
}

function pad(n) {
  return n < 10 ? '0' + n : '' + n;
}

function toggleTimer(id) {
  var item = findItem(id);
  if (!item) return;

  if (item.timerStart) {
    item.timerTotal = getElapsed(item);
    item.timerStart = null;
  } else {
    item.timerStart = Date.now();
  }

  save();
  render();
}

function resetTimer(id) {
  var item = findItem(id);
  if (!item) return;

  item.timerTotal = 0;
  item.timerStart = null;

  save();
  render();
}

function uid() {
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}

function addChecklist() {
  checklists.push({
    id: uid(),
    name: 'Новый чеклист',
    items: []
  });

  save();
  render();
}

function removeChecklist(clId) {
  checklists = checklists.filter(function(c) {
    return c.id !== clId;
  });

  save();
  render();
}

function addItem(clId) {
  var cl = checklists.find(function(c) {
    return c.id === clId;
  });

  if (!cl) return;

  cl.items.push({
    id: uid(),
    text: '',
    checked: false,
    timerTotal: 0,
    timerStart: null,
    subitems: []
  });

  save();
  render();
}

function removeItem(clId, itemId) {
  var cl = checklists.find(function(c) {
    return c.id === clId;
  });

  if (!cl) return;

  cl.items = cl.items.filter(function(i) {
    return i.id !== itemId;
  });

  save();
  render();
}

function addSubitem(clId, itemId) {
  var cl = checklists.find(function(c) {
    return c.id === clId;
  });

  if (!cl) return;

  var item = cl.items.find(function(i) {
    return i.id === itemId;
  });

  if (!item) return;

  item.subitems.push({
    id: uid(),
    text: '',
    checked: false,
    timerTotal: 0,
    timerStart: null
  });

  save();
  render();
}

function removeSubitem(clId, itemId, subId) {
  var cl = checklists.find(function(c) {
    return c.id === clId;
  });

  if (!cl) return;

  var item = cl.items.find(function(i) {
    return i.id === itemId;
  });

  if (!item) return;

  item.subitems = item.subitems.filter(function(s) {
    return s.id !== subId;
  });

  save();
  render();
}

function toggleCheck(id) {
  var item = findItem(id);

  if (item) {
    item.checked = !item.checked;
    save();
    render();
  }
}

function updateName(clId, val) {
  var cl = checklists.find(function(c) {
    return c.id === clId;
  });

  if (cl) {
    cl.name = val;
    save();
  }
}

function updateItemText(id, val) {
  var item = findItem(id);

  if (item) {
    item.text = val;
    save();
  }
}

function progress(cl) {
  var total = 0;
  var done = 0;

  (cl.items || []).forEach(function(item) {
    total++;
    if (item.checked) done++;

    (item.subitems || []).forEach(function(sub) {
      total++;
      if (sub.checked) done++;
    });
  });

  return total === 0 ? 0 : Math.round(done / total * 100);
}

function timerBlock(item) {
  var elapsed = getElapsed(item);
  var running = !!item.timerStart;

  return '<div class="timer-wrap">' +
    '<span id="timer-' + item.id + '" class="timer-display' + (running ? ' running' : '') + '">' + formatTime(elapsed) + '</span>' +
    '<button class="btn-timer ' + (running ? 'stop' : 'start') + '" onclick="toggleTimer(\'' + item.id + '\')">' + (running ? '⏹' : '▶') + '</button>' +
    '<button class="btn-icon" title="Сбросить" onclick="resetTimer(\'' + item.id + '\')">↺</button>' +
  '</div>';
}

function renderSubitem(clId, itemId, sub) {
  return '<div class="subitem-row" id="subrow-' + sub.id + '">' +
    '<input type="checkbox"' + (sub.checked ? ' checked' : '') + ' onchange="toggleCheck(\'' + sub.id + '\')">' +
    '<textarea class="item-text' + (sub.checked ? ' checked-text' : '') + '" rows="1" oninput="updateItemText(\'' + sub.id + '\',this.value)" onblur="save()">' + escHtml(sub.text) + '</textarea>' +
    timerBlock(sub) +
    '<button class="btn-icon" onclick="removeSubitem(\'' + clId + '\',\'' + itemId + '\',\'' + sub.id + '\')" title="Удалить">✕</button>' +
  '</div>';
}

function renderItem(clId, item) {
  var subsHtml = '';

  if (item.subitems && item.subitems.length > 0) {
    subsHtml = '<div class="subitems">' +
      item.subitems.map(function(sub) {
        return renderSubitem(clId, item.id, sub);
      }).join('') +
    '</div>';
  }

  return '<div id="itemrow-' + item.id + '">' +
    '<div class="item-row">' +
      '<input type="checkbox"' + (item.checked ? ' checked' : '') + ' onchange="toggleCheck(\'' + item.id + '\')">' +
      '<textarea class="item-text' + (item.checked ? ' checked-text' : '') + '" rows="1" oninput="updateItemText(\'' + item.id + '\',this.value)" onblur="save()">' + escHtml(item.text) + '</textarea>' +
      timerBlock(item) +
      '<button class="btn-icon" onclick="removeItem(\'' + clId + '\',\'' + item.id + '\')" title="Удалить">✕</button>' +
    '</div>' +
    subsHtml +
    '<div class="add-row">' +
      '<button class="btn-add" onclick="addSubitem(\'' + clId + '\',\'' + item.id + '\')">＋ подзадача</button>' +
    '</div>' +
  '</div>';
}

function renderChecklist(cl) {
  var pct = progress(cl);

  return '<div class="checklist" id="cl-' + cl.id + '">' +
    '<div class="checklist-header">' +
      '☰ <input class="cl-name" value="' + escHtml(cl.name) + '" oninput="updateName(\'' + cl.id + '\',this.value)">' +
      '<small style="color:#6b778c">' + pct + '%</small>' +
      '<button class="btn-icon" onclick="removeChecklist(\'' + cl.id + '\')" title="Удалить чеклист">🗑</button>' +
    '</div>' +
    '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="items">' +
      (cl.items || []).map(function(item) {
        return renderItem(cl.id, item);
      }).join('') +
    '</div>' +
    '<div class="add-row"><button class="btn-add" onclick="addItem(\'' + cl.id + '\')">＋ задача</button></div>' +
  '</div>';
}

function render() {
  document.getElementById('app').innerHTML = checklists.map(renderChecklist).join('');

  t.sizeTo('body').catch(function() {});
}

function escHtml(str) {
  return (str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
